name: Generate GitHub Profile Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Profile details - contribution graph and activity
      - name: Profile Details
        uses: lowlighter/metrics@latest
        with:
          filename: profile-summary-card-output/0-profile-details.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: rpkrupali1
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/New_York

      # Top languages across all repos
      - name: Top Languages
        uses: lowlighter/metrics@latest
        with:
          filename: profile-summary-card-output/1-repos-per-language.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: rpkrupali1
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less, dockerfile, makefile, shell
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      # Contribution stats
      - name: Stats
        uses: lowlighter/metrics@latest
        with:
          filename: profile-summary-card-output/3-stats.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: rpkrupali1
          template: classic
          base: header, repositories
          plugin_followup: yes
          plugin_followup_sections: user

      # Contribution calendar
      - name: Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: profile-summary-card-output/4-productive-time.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: rpkrupali1
          template: classic
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 2
          config_timezone: America/New_York
